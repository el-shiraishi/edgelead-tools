<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エッジリード文面生成ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f3f5f7;
    --panel: #ffffff;
    --ink: #1e2530;
    --ink-soft: #5a6472;
    --line: #e1e5ea;
    --accent: #0f6f6a;
    --accent-soft: #e3f1ef;
    --accent-ink: #0b524e;
    --warn: #b5532c;
    --warn-soft: #fbeae1;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }

  header.top{
    display:flex; align-items:baseline; justify-content:space-between; gap:16px;
    margin-bottom: 22px; flex-wrap: wrap;
  }
  header.top h1{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700; font-size: 22px; letter-spacing: .02em; margin:0;
    display:flex; align-items:center; gap:10px;
  }
  header.top h1 .mark{
    display:inline-flex; align-items:center; justify-content:center;
    width: 34px; height:34px; border-radius: 9px;
    background: var(--accent); color:#fff; font-size:16px; font-weight:700;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }
  header.top .sub{ font-size:12.5px; color: var(--ink-soft); }

  /* tabs */
  .tabs{ display:flex; gap:6px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
  .tab{
    appearance:none; border:none; background:none; cursor:pointer;
    padding: 11px 18px; font-size: 14px; font-weight:600; color: var(--ink-soft);
    border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
    font-family:'Noto Sans JP', sans-serif;
  }
  .tab:hover{ color: var(--ink); }
  .tab.active{ color: var(--accent-ink); border-bottom-color: var(--accent); }

  .grid{
    display:grid; grid-template-columns: 1.05fr 1fr; gap: 22px; align-items:start;
  }
  @media (max-width: 880px){ .grid{ grid-template-columns: 1fr; } }

  .panel{
    background: var(--panel); border:1px solid var(--line); border-radius: 14px;
    padding: 22px; box-shadow: 0 1px 2px rgba(20,30,40,.03);
  }
  .panel h2{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; font-weight:700; margin: 0 0 14px; color: var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .panel h2::before{
    content:''; width:4px; height:14px; background: var(--accent); border-radius:2px; display:inline-block;
  }

  /* company chips */
  .chip-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 20px; }
  .chip{
    appearance:none; cursor:pointer; border:1px solid var(--line); background:#fbfcfd;
    color: var(--ink); font-size: 13px; font-weight:600; padding: 8px 14px;
    border-radius: 999px; transition: all .12s; font-family:'Noto Sans JP', sans-serif;
    white-space:nowrap;
  }
  .chip:hover{ border-color: var(--accent); color: var(--accent-ink); }
  .chip.active{ background: var(--accent); border-color: var(--accent); color:#fff; }

  .badge-note{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    color: var(--warn); background: var(--warn-soft); padding: 6px 10px; border-radius: 8px;
    margin-bottom: 16px;
  }
  .badge-note--doc{
    color: #0c6b91; background: #e3f3fa;
  }
  .sample-link{
    display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
    color: var(--accent-ink); background: var(--accent-soft); padding: 6px 10px; border-radius: 8px;
    margin-bottom: 16px; margin-left: 8px; text-decoration:none; cursor:pointer;
  }
  .sample-link:hover{ text-decoration: underline; }

  .field{ margin-bottom: 14px; }
  .field label{
    display:block; font-size: 12.5px; font-weight:600; color: var(--ink-soft); margin-bottom: 5px;
  }
  .field label .opt{ font-weight:400; color:#9aa4b1; }
  .field label .hint{ font-weight:700; color: var(--warn); font-size: 11.5px; margin-left: 2px; }
  .field-note{
    font-size: 11.5px; color: var(--warn); background: var(--warn-soft);
    border-radius: 6px; padding: 6px 9px; margin-top: 6px; white-space: pre-line; line-height:1.5;
  }
  .field input{
    width:100%; padding: 9px 11px; font-size: 14px; border: 1px solid var(--line);
    border-radius: 8px; background: #fbfcfd; color: var(--ink);
    font-family:'Noto Sans JP', sans-serif; transition: border-color .12s, background .12s;
  }
  .field input:focus{ outline:none; border-color: var(--accent); background:#fff; }
  .field select{
    width:100%; padding: 9px 11px; font-size: 14px; border: 1px solid var(--line);
    border-radius: 8px; background: #fbfcfd; color: var(--ink);
    font-family:'Noto Sans JP', sans-serif; transition: border-color .12s, background .12s;
  }
  .field select:focus{ outline:none; border-color: var(--accent); background:#fff; }
  .check-group{
    display:flex; flex-wrap:wrap; gap: 6px 14px; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; background:#fbfcfd;
  }
  .check-item{ display:flex; align-items:center; gap:6px; font-size: 13px; }
  .check-item input{ width:auto; margin:0; }

  .empty-state{
    color: var(--ink-soft); font-size: 13.5px; padding: 30px 10px; text-align:center;
    border: 1px dashed var(--line); border-radius: 10px; background:#fbfcfd;
  }
  .todo-state{
    color: var(--warn); font-size: 13px; padding: 16px; border-radius:10px;
    background: var(--warn-soft); margin-bottom: 6px;
  }

  /* output */
  .output-panel{ position: sticky; top: 20px; }
  .memo{
    background: #fbfaf6; border:1px solid var(--line); border-radius: 10px;
    padding: 20px 18px 18px; min-height: 260px;
    font-family: var(--mono); font-size: 13px; color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
    background-image: linear-gradient(var(--accent-soft) 0 1px, transparent 1px);
    background-size: 100% 26px;
    line-height: 26px;
    position: relative;
  }
  .memo.is-empty{ color:#9aa4b1; background-image:none; line-height:1.6; }
  .memo::before{
    content:'GENERATED';
    position:absolute; top:-9px; left:14px; background: var(--panel);
    font-family:'Noto Sans JP', sans-serif; font-size:10px; letter-spacing:.12em;
    color: var(--accent-ink); font-weight:700; padding: 0 6px;
  }

  .copy-row{ display:flex; justify-content:flex-end; margin-top: 14px; }
  .copy-btn{
    appearance:none; cursor:pointer; border:none; background: var(--accent); color:#fff;
    font-size: 13.5px; font-weight:700; padding: 10px 18px; border-radius: 9px;
    display:inline-flex; align-items:center; gap:8px; transition: background .12s, transform .05s;
    font-family:'Noto Sans JP', sans-serif;
  }
  .copy-btn:hover{ background: var(--accent-ink); }
  .copy-btn:active{ transform: scale(.97); }
  .copy-btn.copied{ background:#3a8f4a; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1><span class="mark">E</span>エッジリード文面生成ツール</h1>
    <div class="sub">会社を選ぶと、入力項目とフォーマットが自動で切り替わります</div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="identity">人物照合</button>
    <button class="tab" data-tab="job">案件確認</button>
    <button class="tab" data-tab="progress">進捗状況確認</button>
    <button class="tab" data-tab="line">LINE推薦文面</button>
  </div>

  <!-- 人物照合 TAB -->
  <div class="tab-panel" id="tab-identity">
    <div class="grid">
      <div class="panel">
        <h2>会社を選択</h2>
        <div class="chip-grid" id="identityChips"></div>
        <div id="identityBadge"></div>
        <div id="identityFields"></div>
      </div>

      <div class="panel output-panel">
        <h2>生成された文面</h2>
        <div class="memo is-empty" id="identityOutput">← 会社を選択して入力してください</div>
        <div class="copy-row">
          <button class="copy-btn" id="identityCopy">📋 コピー</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 案件確認 TAB -->
  <div class="tab-panel" id="tab-job" style="display:none;">
    <div class="grid">
      <div class="panel">
        <h2>会社を選択</h2>
        <div class="chip-grid" id="jobChips"></div>
        <div id="jobBadge"></div>
        <div id="jobFields"></div>
      </div>

      <div class="panel output-panel">
        <h2>生成された文面</h2>
        <div class="memo is-empty" id="jobOutput">← 会社を選択して入力してください</div>
        <div class="copy-row">
          <button class="copy-btn" id="jobCopy">📋 コピー</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 進捗状況確認 TAB -->
  <div class="tab-panel" id="tab-progress" style="display:none;">
    <div class="grid">
      <div class="panel">
        <h2>会社を選択</h2>
        <div class="chip-grid" id="progressChips"></div>
        <div id="progressBadge"></div>
        <div id="progressFields"></div>
      </div>

      <div class="panel output-panel">
        <h2>生成された文面</h2>
        <div class="memo is-empty" id="progressOutput">← 会社を選択して入力してください</div>
        <div class="copy-row">
          <button class="copy-btn" id="progressCopy">📋 コピー</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LINE推薦文面 TAB -->
  <div class="tab-panel" id="tab-line" style="display:none;">
    <div class="grid">
      <div class="panel">
        <h2>会社を選択</h2>
        <div class="chip-grid" id="lineChips"></div>
        <div id="lineBadge"></div>
        <div id="lineFields"></div>
      </div>

      <div class="panel output-panel">
        <h2>生成された文面</h2>
        <div class="memo is-empty" id="lineOutput">← 会社を選択して入力してください</div>
        <div class="copy-row">
          <button class="copy-btn" id="lineCopy">📋 コピー</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ---------------------------------------------------------
   会社ごとの設定

   badge : 一覧上の注意書き（あれば）

--------------------------------------------------------- */

/* ---------------------------------------------------------
   汎用ツール初期化：company一覧 + 生成ロジックを
   チップ / フォーム / 出力パネルに結びつける
--------------------------------------------------------- */
function initTool(prefix, companiesCfg, order, prependCompanyLabel){
  let currentCompany = null;
  let values = {};

  const chipContainer = document.getElementById(prefix + 'Chips');
  const badgeNoteEl = document.getElementById(prefix + 'Badge');
  const formFieldsEl = document.getElementById(prefix + 'Fields');
  const outputEl = document.getElementById(prefix + 'Output');
  const copyBtn = document.getElementById(prefix + 'Copy');

  order.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = companiesCfg[key].label;
    btn.dataset.key = key;
    btn.addEventListener('click', () => selectCompany(key));
    chipContainer.appendChild(btn);
  });

  function selectCompany(key){
    currentCompany = key;
    values = {};
    [...chipContainer.children].forEach(c => c.classList.toggle('active', c.dataset.key === key));
    renderForm();
    updateOutput();
  }

  function renderForm(){
    const cfg = companiesCfg[currentCompany];
    badgeNoteEl.innerHTML = '';
    formFieldsEl.innerHTML = '';

    const rawBadge = (typeof cfg.badge === 'function') ? cfg.badge(values) : cfg.badge;
    const badgeList = Array.isArray(rawBadge) ? rawBadge.filter(Boolean) : (rawBadge ? [rawBadge] : []);
    badgeList.forEach(text => {
      const b = document.createElement('div');
      b.className = 'badge-note' + (text.startsWith('【必要な書類】') ? ' badge-note--doc' : '');
      b.textContent = text;
      badgeNoteEl.appendChild(b);
    });

    if (cfg.sample){
      const a = document.createElement('a');
      a.className = 'sample-link';
      a.href = cfg.sample.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = '📄 ' + cfg.sample.label;
      badgeNoteEl.appendChild(a);
    }

    if (!cfg.generate){
      formFieldsEl.innerHTML = `<div class="todo-state">${cfg.label} のテンプレートはまだ登録されていません。文言を教えていただければ追加します。</div>`;
      return;
    }

    const fieldList = (typeof cfg.fields === 'function') ? cfg.fields(values) : cfg.fields;
    fieldList.forEach(f => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      const label = document.createElement('label');
      label.innerHTML = f.label + (f.optional ? ' <span class="opt">(任意)</span>' : '') + (f.hint ? ' <span class="hint">' + f.hint + '</span>' : '');
      if (f.label) wrap.appendChild(label);

      if (f.type === 'info'){
        // display-only: label + note act as a static confirmation block, no input control
      } else if (f.type === 'select'){
        const select = document.createElement('select');
        select.dataset.id = f.id;
        const blank = document.createElement('option');
        blank.value = ''; blank.textContent = '選択してください';
        select.appendChild(blank);
        f.options.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt; o.textContent = opt;
          select.appendChild(o);
        });
        select.addEventListener('change', () => {
          values[f.id] = select.value;
          if (f.controlsForm) renderForm();
          updateOutput();
        });
        if (values[f.id]) select.value = values[f.id];
        wrap.appendChild(select);
      } else if (f.type === 'multiselect'){
        const group = document.createElement('div');
        group.className = 'check-group';
        f.options.forEach((opt, i) => {
          const item = document.createElement('label');
          item.className = 'check-item';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.value = opt;
          cb.addEventListener('change', () => {
            const checked = [...group.querySelectorAll('input:checked')].map(c => c.value);
            values[f.id] = checked.length ? checked.join('、') : (f.noneLabel || '');
            updateOutput();
          });
          item.appendChild(cb);
          item.appendChild(document.createTextNode(opt));
          group.appendChild(item);
        });
        wrap.appendChild(group);
      } else {
        const input = document.createElement('input');
        input.type = (f.type === 'date') ? 'date' : 'text';
        input.dataset.id = f.id;
        if (f.placeholder) input.placeholder = f.placeholder;
        input.addEventListener('input', () => {
          values[f.id] = (f.type === 'date') ? input.value.replace(/-/g, '/') : input.value;
          updateOutput();
        });
        if (values[f.id]) input.value = (f.type === 'date') ? values[f.id].replace(/\//g, '-') : values[f.id];
        wrap.appendChild(input);
      }

      if (f.note){
        const noteEl = document.createElement('div');
        noteEl.className = 'field-note';
        noteEl.textContent = f.note;
        wrap.appendChild(noteEl);
      }
      formFieldsEl.appendChild(wrap);
    });
  }

  function updateOutput(){
    if (!currentCompany){
      outputEl.textContent = '← 会社を選択して入力してください';
      outputEl.classList.add('is-empty');
      return;
    }
    const cfg = companiesCfg[currentCompany];
    if (!cfg.generate){
      outputEl.textContent = '← このテンプレートはまだ準備中です';
      outputEl.classList.add('is-empty');
      return;
    }
    let text = cfg.generate(new Proxy(values, { get: (t,p) => t[p] ?? '' }));
    if (prependCompanyLabel) text = `${cfg.label}\n${text}`;
    outputEl.textContent = text;
    outputEl.classList.remove('is-empty');
  }

  copyBtn.addEventListener('click', async () => {
    const text = outputEl.textContent;
    if (!text || outputEl.classList.contains('is-empty')) return;
    try{
      await navigator.clipboard.writeText(text);
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    copyBtn.textContent = '✅ コピーしました';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = '📋 コピー';
      copyBtn.classList.remove('copied');
    }, 1500);
  });

  updateOutput();
}

// tabs
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
});
